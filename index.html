<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Snake Game</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #2f3640, #000);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f5f6fa;
    }

    .wrapper {
      text-align: center;
    }

    h1 {
      margin-bottom: 0.25rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 1.2rem;
      color: #00ff88;
    }

    .sub {
      margin-bottom: 0.75rem;
      font-size: 0.8rem;
      opacity: 0.8;
    }

    #game-container {
      background: #111;
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.7);
      display: inline-block;
      position: relative;
    }

    #scoreboard {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }

    #scoreboard span {
      min-width: 80px;
      text-align: left;
    }

    #scoreboard span:last-child {
      text-align: right;
    }

    canvas {
      background: #000;
      border-radius: 8px;
      display: block;
    }

    #overlay {
      position: absolute;
      inset: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    #overlay-inner {
      text-align: center;
      background: rgba(0, 0, 0, 0.7);
      padding: 16px 20px;
      border-radius: 10px;
      border: 1px solid #00ff88;
      pointer-events: auto;
    }

    #overlay h2 {
      margin: 0 0 8px;
      font-size: 1rem;
      color: #00ff88;
    }

    #overlay p {
      margin: 0 0 10px;
      font-size: 0.8rem;
      opacity: 0.9;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 0.85rem;
      cursor: pointer;
      background: #00ff88;
      color: #000;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
      background: #00e676;
    }

    button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .controls-hint {
      margin-top: 0.5rem;
      font-size: 0.75rem;
      opacity: 0.7;
    }

    @media (max-width: 600px) {
      canvas {
        width: 260px;
        height: 260px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>Snake</h1>
    <div class="sub">Arrow keys to move · Space to pause</div>

    <div id="game-container">
      <div id="scoreboard">
        <span>Score: <span id="score">0</span></span>
        <span>Best: <span id="best">0</span></span>
      </div>
      <canvas id="game" width="320" height="320"></canvas>

      <div id="overlay">
        <div id="overlay-inner">
          <h2>Press any arrow key</h2>
          <p>Eat the green squares, don’t hit the walls or yourself.</p>
          <button id="start-btn">Start</button>
          <div class="controls-hint">Desktop: arrows / space · Mobile: swipe</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const overlay = document.getElementById("overlay");
    const overlayInner = document.getElementById("overlay-inner");
    const startBtn = document.getElementById("start-btn");

    const tileCount = 16; // 16x16 grid
    const tileSize = canvas.width / tileCount;

    let snake, direction, nextDirection, food, score, bestScore, gameLoop, running, justDied;

    // Load best score from localStorage
    bestScore = parseInt(localStorage.getItem("snake_best") || "0", 10);
    bestEl.textContent = bestScore;

    function resetGame() {
      snake = [
        { x: 8, y: 8 },
        { x: 7, y: 8 },
        { x: 6, y: 8 }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      scoreEl.textContent = score;
      placeFood();
      running = false;
      justDied = false;
    }

    function placeFood() {
      while (true) {
        const x = Math.floor(Math.random() * tileCount);
        const y = Math.floor(Math.random() * tileCount);
        const onSnake = snake.some(seg => seg.x === x && seg.y === y);
        if (!onSnake) {
          food = { x, y };
          break;
        }
      }
    }

    function drawBoard() {
      // Background
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Subtle grid
      ctx.strokeStyle = "rgba(255,255,255,0.04)";
      ctx.lineWidth = 1;
      for (let i = 0; i <= tileCount; i++) {
        const p = i * tileSize;
        ctx.beginPath();
        ctx.moveTo(p, 0);
        ctx.lineTo(p, canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, p);
        ctx.lineTo(canvas.width, p);
        ctx.stroke();
      }
    }

    function drawSnake() {
      for (let i = 0; i < snake.length; i++) {
        const seg = snake[i];
        const isHead = i === 0;

        const x = seg.x * tileSize;
        const y = seg.y * tileSize;

        const gradient = ctx.createLinearGradient(x, y, x + tileSize, y + tileSize);
        if (isHead) {
          gradient.addColorStop(0, "#00ff88");
          gradient.addColorStop(1, "#00b894");
        } else {
          gradient.addColorStop(0, "#00b894");
          gradient.addColorStop(1, "#00916e");
        }

        ctx.fillStyle = gradient;
        ctx.fillRect(x + 1, y + 1, tileSize - 2, tileSize - 2);

        if (isHead) {
          // Eyes
          ctx.fillStyle = "#000";
          const eyeSize = tileSize * 0.12;
          ctx.beginPath();
          ctx.arc(x + tileSize * 0.3, y + tileSize * 0.3, eyeSize, 0, Math.PI * 2);
          ctx.arc(x + tileSize * 0.7, y + tileSize * 0.3, eyeSize, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawFood() {
      const x = food.x * tileSize;
      const y = food.y * tileSize;

      const gradient = ctx.createRadialGradient(
        x + tileSize / 2,
        y + tileSize / 2,
        2,
        x + tileSize / 2,
        y + tileSize / 2,
        tileSize / 2
      );
      gradient.addColorStop(0, "#a3ffb5");
      gradient.addColorStop(1, "#00ff88");

      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.roundRect(x + 3, y + 3, tileSize - 6, tileSize - 6, 4);
      ctx.fill();
    }

    function update() {
      if (!running) return;

      // Apply buffered direction
      direction = nextDirection;

      const head = snake[0];
      const newHead = {
        x: head.x + direction.x,
        y: head.y + direction.y
      };

      // Wall collision
      if (
        newHead.x < 0 ||
        newHead.y < 0 ||
        newHead.x >= tileCount ||
        newHead.y >= tileCount
      ) {
        return gameOver();
      }

      // Self collision
      if (snake.some(seg => seg.x === newHead.x && seg.y === newHead.y)) {
        return gameOver();
      }

      snake.unshift(newHead);

      // Food
      if (newHead.x === food.x && newHead.y === food.y) {
        score++;
        scoreEl.textContent = score;
        if (score > bestScore) {
          bestScore = score;
          bestEl.textContent = bestScore;
          localStorage.setItem("snake_best", bestScore.toString());
        }
        placeFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      drawBoard();
      drawFood();
      drawSnake();
    }

    function gameOver() {
      running = false;
      justDied = true;
      clearInterval(gameLoop);
      overlay.style.display = "flex";
      overlayInner.innerHTML = `
        <h2>Game over</h2>
        <p>Score: ${score} · Best: ${bestScore}</p>
        <button id="restart-btn">Play again</button>
        <div class="controls-hint">Arrow keys to move · Space to pause</div>
      `;
      document.getElementById("restart-btn").onclick = () => {
        resetGame();
        startGame();
      };
    }

    function startGame() {
      overlay.style.display = "none";
      running = true;
      justDied = false;
      draw();
      clearInterval(gameLoop);
      // Speed: lower = faster (ms per step)
      const speed = 110;
      gameLoop = setInterval(update, speed);
    }

    function togglePause() {
      if (!running && !justDied) {
        // Resume
        startGame();
      } else if (running) {
        running = false;
        clearInterval(gameLoop);
        overlay.style.display = "flex";
        overlayInner.innerHTML = `
          <h2>Paused</h2>
          <p>Press space or click resume to continue.</p>
          <button id="resume-btn">Resume</button>
        `;
        document.getElementById("resume-btn").onclick = () => {
          startGame();
        };
      }
    }

    // Keyboard controls
    window.addEventListener("keydown", (e) => {
      const key = e.key;

      if (key === " " || key === "Spacebar") {
        e.preventDefault();
        if (!justDied) togglePause();
        return;
      }

      let newDir = null;
      if (key === "ArrowUp") newDir = { x: 0, y: -1 };
      else if (key === "ArrowDown") newDir = { x: 0, y: 1 };
      else if (key === "ArrowLeft") newDir = { x: -1, y: 0 };
      else if (key === "ArrowRight") newDir = { x: 1, y: 0 };

      if (newDir) {
        e.preventDefault();
        // Prevent reversing directly
        if (
          newDir.x === -direction.x &&
          newDir.y === -direction.y &&
          snake.length > 1
        ) {
          return;
        }
        nextDirection = newDir;
        if (!running) {
          // Start on first arrow press
          startGame();
        }
      }
    });

    // Simple swipe controls for mobile
    let touchStartX = null;
    let touchStartY = null;

    canvas.addEventListener("touchstart", (e) => {
      const t = e.touches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
    });

    canvas.addEventListener("touchmove", (e) => {
      if (touchStartX === null || touchStartY === null) return;
      const t = e.touches[0];
      const dx = t.clientX - touchStartX;
      const dy = t.clientY - touchStartY;

      if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;

      let newDir = null;
      if (Math.abs(dx) > Math.abs(dy)) {
        // Horizontal swipe
        newDir = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 };
      } else {
        // Vertical swipe
        newDir = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 };
      }

      if (
        newDir &&
        !(
          newDir.x === -direction.x &&
          newDir.y === -direction.y &&
          snake.length > 1
        )
      ) {
        nextDirection = newDir;
        if (!running) startGame();
      }

      touchStartX = null;
      touchStartY = null;
    });

    // Start button
    startBtn.addEventListener("click", () => {
      if (!running) {
        startGame();
      }
    });

    // Initial setup
    resetGame();
    draw();
  </script>
</body>
</html>
